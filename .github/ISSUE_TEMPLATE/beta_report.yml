name: Beta result
description: Record a signed release-candidate pass or a redacted compatibility failure.
title: "[Beta]: "
labels:
  - beta-feedback
body:
  - type: markdown
    attributes:
      value: Use only disposable source and never include credentials, private code, repository paths, or agent transcripts.
  - type: input
    id: version
    attributes:
      label: Candidate version and Actions run
      description: Include the exact v-prefixed version and release-candidate workflow URL.
      placeholder: v0.1.1 — https://github.com/chriswu727/agent-duet/actions/runs/…
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple silicon
        - macOS Intel
        - Windows 11 x64
        - Ubuntu 24.04 x64 (X11)
        - Linux x64 (Wayland or other distribution)
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, architecture, Git, Codex, and Claude Code versions plus ChatGPT/Claude.ai login types. Never include tokens.
      render: text
    validations:
      required: true
  - type: checkboxes
    id: gates
    attributes:
      label: Candidate gates
      options:
        - label: SHA-256 checksums and GitHub attestations verified.
          required: true
        - label: Platform signature or Linux provenance checks passed.
          required: true
        - label: Fresh install, first launch, and onboarding passed.
          required: true
        - label: One explicitly consented disposable-repository collaboration passed.
          required: true
        - label: Diff inspection, Apply or Discard, restart recovery, and local-data deletion were checked.
          required: true
  - type: dropdown
    id: result
    attributes:
      label: Result
      options:
        - PASS
        - FAIL
        - BLOCKED
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Redacted evidence or blocker
      description: List only check outcomes, stable error codes, and stop reasons. Do not paste model output or source.
      render: text
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: This report contains no credentials, private source, identifying local paths, or agent transcripts.
          required: true
